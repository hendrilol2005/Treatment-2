<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pemesanan Makanan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- MODAL NOTIFIKASI -->
  <div id="notificationModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-icon">⚠️</span>
        <h3>Perhatian</h3>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalOkBtn" class="btn-modal-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- NAVIGASI -->
  <nav class="navbar">
    <span class="brand">🍽️ Pemesanan Makanan</span>
    <div class="nav-links">
      <a href="#" id="navForm" class="active">Form Pesan</a>
      <a href="#" id="navTable">Daftar Pesanan</a>
    </div>
  </nav>

  <!-- FORM -->
  <section id="pageForm" class="page active-page">
    <div class="card form-card">
      <h2>📝 Form Pemesanan</h2>
      <form id="dataForm" novalidate>
        <div class="form-group">
          <label for="nama">Nama Pelanggan <span class="required">*</span></label>
          <input type="text" id="nama" placeholder="Masukkan nama Anda" />
        </div>
        <div class="form-group">
          <label for="meja">Nomor Meja <span class="required">*</span></label>
          <input type="text" id="meja" placeholder="Contoh: A1, B2, 5" />
        </div>
        <div class="form-group">
          <label for="menu">Pilih Menu <span class="required">*</span></label>
          <select id="menu">
            <option value="">-- pilih menu --</option>
            <option value="Nasi Goreng">🍛 Nasi Goreng</option>
            <option value="Mie Ayam">🍜 Mie Ayam</option>
            <option value="Sate Ayam">🍢 Sate Ayam</option>
            <option value="Bakso">🥣 Bakso</option>
            <option value="Es Teh Manis">🧋 Es Teh Manis</option>
            <option value="Jus Jeruk">🍊 Jus Jeruk</option>
            <option value="Kopi Hitam">☕ Kopi Hitam</option>
          </select>
        </div>
        <div class="form-group">
          <label for="jumlah">Jumlah Porsi <span class="required">*</span></label>
          <input type="number" id="jumlah" placeholder="1" min="1" />
        </div>
        <div class="form-group">
          <label for="catatan">Catatan Tambahan</label>
          <textarea id="catatan" rows="2" placeholder="Level pedas, tambah saus, dll."></textarea>
        </div>
        <button type="submit" class="btn-primary">Pesan Sekarang</button>
      </form>
      <div id="formMessage" class="message"></div>
    </div>
  </section>

  <!-- TABEL -->
  <section id="pageTable" class="page">
    <div class="card table-card">
      <h2>📋 Daftar Pesanan</h2>
      <div class="table-wrapper">
        <table id="dataTable">
          <thead>
            <tr>
              <th>No</th>
              <th>Nama</th>
              <th>Meja</th>
              <th>Menu</th>
              <th>Jumlah</th>
              <th>Catatan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <p id="emptyMessage" class="empty-msg">Belum ada pesanan. Silakan pesan di halaman Form.</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
